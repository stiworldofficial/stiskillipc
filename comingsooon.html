<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA meta tags -->
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Coming Soon</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom animations and styles -->
    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Smooth fade in animation for the text */
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in-up 1.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-950 text-white h-screen w-screen flex items-center justify-center overflow-hidden relative font-sans antialiased selection:bg-purple-500 selection:text-white">

    <!-- Background glowing animated shapes -->
    <div class="absolute top-1/4 left-1/4 w-64 h-64 md:w-96 md:h-96 bg-indigo-600 rounded-full mix-blend-screen filter blur-[80px] md:blur-[120px] opacity-40 animate-blob pointer-events-none"></div>
    <div class="absolute top-1/3 right-1/4 w-64 h-64 md:w-96 md:h-96 bg-teal-500 rounded-full mix-blend-screen filter blur-[80px] md:blur-[120px] opacity-40 animate-blob animation-delay-2000 pointer-events-none"></div>
    <div class="absolute bottom-1/4 left-1/2 w-64 h-64 md:w-96 md:h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[80px] md:blur-[120px] opacity-40 animate-blob animation-delay-4000 pointer-events-none"></div>

    <!-- Main Content Container -->
    <div class="relative z-10 glass-panel px-8 py-12 md:px-24 md:py-20 rounded-3xl text-center mx-4 animate-fade-in">
        
        <!-- Subtle top badge (optional, hidden by default but good for spacing) -->
        <div class="w-12 h-1 bg-gradient-to-r from-indigo-500 to-purple-500 mx-auto rounded-full mb-8 opacity-70"></div>
        
        <!-- The Text -->
        <h1 class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-gray-100 to-gray-500 leading-tight pb-2">
            Coming Soon
        </h1>
        
        <!-- Pulsing dots to indicate something is working in background -->
        <div class="flex justify-center items-center gap-2 mt-6 md:mt-10">
            <div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-gray-400 animate-pulse"></div>
            <div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-gray-400 animate-pulse animation-delay-2000"></div>
            <div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-gray-400 animate-pulse animation-delay-4000"></div>
        </div>
        
    </div>

</body>
</html>
